<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NCCS">
    <title>NCCS Fire Caulk — Unified Capture</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --nccs-dark: #1a1a2e;
            --nccs-accent: #e94560;
            --nccs-teal: #008B8B;
            --gray-100: #f7f7f7;
            --gray-200: #e8e8e8;
            --gray-300: #d1d1d1;
            --gray-500: #888;
            --gray-700: #444;
            --success: #27ae60;
            --warning: #f39c12;
            --skip: #9b59b6;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            background: var(--gray-100);
            color: var(--gray-700);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .hidden { display: none !important; }
        
        /* Header */
        .header {
            background: var(--nccs-dark);
            color: white;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { margin: 0; font-size: 16px; font-weight: 600; }
        .header-subtitle { font-size: 11px; opacity: 0.7; }
        .header-right { display: flex; gap: 8px; }
        
        /* Buttons */
        .btn {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: var(--nccs-accent); color: white; }
        .btn-secondary { background: var(--gray-200); color: var(--gray-700); }
        .btn-success { background: var(--success); color: white; }
        .btn-teal { background: var(--nccs-teal); color: white; }
        .btn-small { padding: 6px 10px; font-size: 12px; }
        .btn:active { opacity: 0.9; transform: scale(0.98); }
        
        /* Home Screen */
        .container { padding: 16px; max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .card h2 { margin: 0 0 12px 0; font-size: 16px; color: var(--nccs-teal); }
        .form-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 120px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            font-size: 16px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            background: white;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--nccs-teal);
        }
        
        /* Unit List */
        .unit-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--gray-100);
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        .unit-item:hover { background: var(--gray-200); }
        .unit-item h4 { margin: 0; font-size: 15px; }
        .unit-item p { margin: 2px 0 0; font-size: 11px; color: var(--gray-500); }
        .unit-progress { text-align: right; }
        .unit-progress .pct { font-size: 18px; font-weight: 700; color: var(--nccs-teal); }
        .unit-progress .pct.complete { color: var(--success); }
        
        /* Drawing Screen */
        .drawing-screen {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .drawing-toolbar {
            background: var(--nccs-dark);
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .drawing-toolbar select {
            padding: 6px 10px;
            border-radius: 4px;
            border: none;
            font-size: 13px;
        }
        .drawing-canvas-wrap {
            flex: 1;
            min-width: 0;
            overflow: auto;
            background: #222;
            position: relative;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }
        .drawing-main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        #drawingWrapper {
            position: relative;
            display: inline-block;
            transform-origin: 0 0;
            margin: 0;
            padding: 0;
        }
        #drawingImage {
            display: block;
            max-width: none;
            max-height: none;
        }
        
        /* Penetration Markers on Drawing */
        .pen-marker {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            z-index: 10;
            transition: all 0.15s;
        }
        .pen-marker.unmarked {
            background: var(--gray-500);
            border: 2px dashed white;
        }
        .pen-marker.marked {
            background: var(--nccs-accent);
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .pen-marker.partial {
            background: var(--warning);
            border: 2px solid white;
        }
        .pen-marker.complete {
            background: var(--success);
            border: 2px solid white;
        }
        .pen-marker.skipped {
            background: var(--skip);
            border: 2px dashed white;
            opacity: 0.7;
        }
        .pen-marker:hover { transform: translate(-50%, -50%) scale(1.15); }
        .pen-marker.placing { 
            background: var(--nccs-teal);
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.2); } }
        
        /* Mode indicator */
        .mode-banner {
            background: var(--nccs-teal);
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 13px;
            font-weight: 600;
        }
        .mode-banner.placing { background: var(--nccs-accent); }
        
        /* Zoom controls */
        .zoom-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 4px;
            background: var(--nccs-dark);
            padding: 6px;
            border-radius: 8px;
            z-index: 50;
        }
        .zoom-controls button {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--gray-700);
            color: white;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
        }
        .zoom-controls button:hover { background: var(--gray-500); }
        .zoom-level {
            padding: 0 10px;
            display: flex;
            align-items: center;
            color: white;
            font-size: 13px;
        }
        
        /* Photo Capture Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            border-radius: 16px 16px 0 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            background: var(--nccs-dark);
            color: white;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 { margin: 0; font-size: 16px; }
        .modal-body { padding: 16px; overflow-y: auto; flex: 1; }
        
        /* Stage tabs in modal */
        .stage-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }
        .stage-tab {
            flex: 1;
            padding: 10px 6px;
            border: 2px solid var(--gray-200);
            background: white;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-500);
            cursor: pointer;
            text-align: center;
        }
        .stage-tab.active {
            border-color: var(--nccs-teal);
            color: var(--nccs-teal);
            background: rgba(0,139,139,0.1);
        }
        .stage-tab.complete { border-color: var(--success); color: var(--success); }
        
        /* Cut cards */
        .cuts-row { display: flex; gap: 10px; }
        .cut-card {
            flex: 1;
            background: var(--gray-100);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .cut-card h4 { margin: 0 0 4px; font-size: 14px; }
        .cut-label { font-size: 10px; color: var(--gray-500); margin-bottom: 10px; }
        .photo-buttons { display: flex; gap: 6px; }
        .photo-btn {
            flex: 1;
            padding: 12px 8px;
            border: 2px dashed var(--gray-300);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--gray-500);
        }
        .photo-btn .icon { font-size: 20px; }
        .photo-btn.captured {
            border: 2px solid var(--success);
            background: rgba(39,174,96,0.1);
            color: var(--success);
        }
        .photo-btn:active { transform: scale(0.97); }
        
        /* Comment section */
        .comment-section { margin-top: 16px; }
        .comment-section label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        .comment-section textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--nccs-dark);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 300;
            opacity: 0;
            transition: all 0.3s;
        }
        .toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
        
        /* Sidebar stats (desktop) */
        @media (min-width: 768px) {
            .drawing-screen { flex-direction: column; }
            .drawing-main {
                display: flex;
                flex: 1;
                overflow: hidden;
            }
            .drawing-sidebar {
                width: 260px;
                min-width: 260px;
                max-width: 260px;
                flex-shrink: 0;
                background: #252540;
                padding: 16px;
                overflow-y: auto;
                color: white;
                order: 2;
            }
            .drawing-canvas-wrap {
                order: 1;
            }
            .drawing-sidebar h3 { font-size: 12px; color: var(--nccs-teal); text-transform: uppercase; margin-bottom: 10px; }
            .pen-list-item {
                display: flex;
                justify-content: space-between;
                padding: 8px;
                background: var(--nccs-dark);
                margin-bottom: 4px;
                border-radius: 4px;
                font-size: 12px;
                cursor: pointer;
            }
            .pen-list-item:hover { background: #2a2a4e; }
            .pen-list-item .status { font-size: 10px; }
            .pen-list-item .status.complete { color: var(--success); }
            .pen-list-item .status.partial { color: var(--warning); }
            .pen-list-item .status.skipped { color: var(--skip); }
        }
        @media (max-width: 767px) {
            .drawing-sidebar { display: none; }
        }
        
        /* No image state */
        .no-drawing {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            padding: 20px;
            text-align: center;
        }
        .no-drawing p { margin-bottom: 12px; }
    </style>
</head>
<body>
    <input type="file" id="photoInput" accept="image/*" capture="environment" class="hidden">
    <input type="file" id="drawingInput" accept="image/*,.pdf" class="hidden">
    <input type="file" id="importInput" accept=".json" class="hidden">
    
    <!-- HOME SCREEN -->
    <div id="homeScreen">
        <div class="header">
            <div>
                <h1>🔧 NCCS Fire Caulk</h1>
                <div class="header-subtitle">Montage Residences</div>
            </div>
            <div class="header-right">
                <button class="btn btn-small btn-secondary" onclick="exportAll()">📤 Export</button>
                <button class="btn btn-small btn-secondary" onclick="document.getElementById('importInput').click()">📥 Import</button>
            </div>
        </div>
        
        <div class="container">
            <div class="card">
                <h2>➕ New Unit</h2>
                <div class="form-row">
                    <div class="form-group" style="flex: 2;">
                        <label>Unit / Condo #</label>
                        <input type="text" id="unitInput" placeholder="1505 or 23">
                    </div>
                    <div class="form-group">
                        <label># Penetrations</label>
                        <input type="number" id="penCountInput" placeholder="32" min="1" max="100" inputmode="numeric">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Level</label>
                        <select id="levelSelect">
                            <option value="">Select...</option>
                            <option value="L1">Level 1</option>
                            <option value="L2">Level 2</option>
                            <option value="L3">Level 3</option>
                            <option value="L4">Level 4</option>
                            <option value="L5">Level 5</option>
                            <option value="L6">Level 6</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Drawing Areas</label>
                        <input type="text" id="areasInput" placeholder="2,4" title="Comma-separated area numbers">
                    </div>
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="createUnit()">Create Unit</button>
            </div>
            
            <div class="card">
                <h2>📋 Units</h2>
                <div id="unitList"></div>
                <div id="emptyState" class="hidden" style="text-align: center; padding: 30px; color: var(--gray-500);">
                    <p>No units yet. Create one above.</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- DRAWING SCREEN -->
    <div id="drawingScreen" class="drawing-screen hidden">
        <div class="header">
            <div>
                <h1 id="drawingTitle">Unit 1505</h1>
                <div class="header-subtitle" id="drawingSubtitle">32 penetrations • Level 5</div>
            </div>
            <div class="header-right">
                <button class="btn btn-small btn-secondary" onclick="showHome()">← Back</button>
                <button class="btn btn-small btn-secondary" onclick="editUnit()">✏️ Edit</button>
                <button class="btn btn-small btn-teal" onclick="togglePlaceMode()">📍 Place</button>
            </div>
        </div>
        
        <div class="drawing-toolbar">
            <select id="areaSelect" onchange="loadArea()">
                <option value="">Select Area...</option>
            </select>
            <button class="btn btn-small btn-secondary" onclick="document.getElementById('drawingInput').click()">📁 Load Image</button>
            <button class="btn btn-small btn-success" onclick="addPenetrations()">➕ Add Pens</button>
            <span style="color: white; font-size: 12px; margin-left: auto;" id="areaStatus">No drawing loaded</span>
        </div>
        
        <div id="modeBanner" class="mode-banner hidden">Click on drawing to place Pen #<span id="nextPenNum">1</span></div>
        
        <div class="drawing-main">
            <div class="drawing-canvas-wrap" id="canvasWrap">
                <div id="noDrawing" class="no-drawing">
                    <p>Select an area and load a drawing image</p>
                    <button class="btn btn-teal" onclick="document.getElementById('drawingInput').click()">📁 Load Image</button>
                </div>
                <div id="drawingWrapper" style="display: none;">
                    <img id="drawingImage" onclick="handleDrawingClick(event)">
                </div>
            </div>
            
            <div class="drawing-sidebar" id="drawingSidebar">
                <h3>Penetrations</h3>
                <div id="penList"></div>
            </div>
        </div>
        
        <div class="zoom-controls">
            <button onclick="zoomOut()">−</button>
            <span class="zoom-level"><span id="zoomLevel">100</span>%</span>
            <button onclick="zoomIn()">+</button>
            <button onclick="resetZoom()">⟲</button>
        </div>
    </div>
    
    <!-- PHOTO CAPTURE MODAL -->
    <div id="captureModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="capturePenTitle">Penetration 1</h3>
                <button class="btn btn-small btn-secondary" onclick="closeCapture()">✕ Close</button>
            </div>
            <div class="modal-body">
                <div class="stage-tabs">
                    <div class="stage-tab" data-stage="before" onclick="setStage('before')">
                        <div>Before</div>
                        <div id="beforeCount" style="font-size: 10px;">0/4</div>
                    </div>
                    <div class="stage-tab" data-stage="after" onclick="setStage('after')">
                        <div>After</div>
                        <div id="afterCount" style="font-size: 10px;">0/4</div>
                    </div>
                    <div class="stage-tab" data-stage="patch" onclick="setStage('patch')">
                        <div>Patch</div>
                        <div id="patchCount" style="font-size: 10px;">0/4</div>
                    </div>
                </div>
                
                <div class="cuts-row" id="cutsContainer"></div>
                
                <div class="comment-section">
                    <label>Notes for this penetration</label>
                    <textarea id="penComment" placeholder="Pipe size, issues, etc..." onchange="saveComment()"></textarea>
                </div>
                
                <div style="margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--gray-200);">
                    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                        <button class="btn btn-small" style="background: var(--skip); color: white;" onclick="toggleSkip()" id="skipBtn">
                            ⏭ Mark as Exploratory/Skip
                        </button>
                        <button class="btn btn-small btn-secondary" onclick="relocatePen()">
                            📍 Relocate on Drawing
                        </button>
                        <button class="btn btn-small" style="background: #c0392b; color: white;" onclick="deletePen()">
                            🗑 Delete Penetration
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        // ═══════════════════════════════════════════════════════════════════
        // STATE
        // ═══════════════════════════════════════════════════════════════════
        
        let units = {};
        // units[id] = {
        //   unit_number, num_penetrations, level, areas: [2,4],
        //   penetrations: { 1: { area: 'L5-2', x: 0.5, y: 0.3, comment: '', captured: {}, status: 'active'|'skip' }, ... },
        //   drawings: { 'L5-2': 'data:image/...', ... }
        // }
        
        let currentUnit = null;
        let currentArea = null;
        let currentPen = null;
        let currentStage = 'before';
        let placeMode = false;
        let relocateMode = false;
        let zoom = 1;
        let pendingPhoto = null;
        
        // ═══════════════════════════════════════════════════════════════════
        // PERSISTENCE
        // ═══════════════════════════════════════════════════════════════════
        
        function loadState() {
            try {
                const saved = localStorage.getItem('nccs_residences_v1');
                if (saved) units = JSON.parse(saved);
            } catch (e) {
                console.error('Load failed:', e);
                units = {};
            }
        }
        
        function saveState() {
            try {
                localStorage.setItem('nccs_residences_v1', JSON.stringify(units));
            } catch (e) {
                console.error('Save failed:', e);
            }
        }
        
        // ═══════════════════════════════════════════════════════════════════
        // NAVIGATION
        // ═══════════════════════════════════════════════════════════════════
        
        function showHome() {
            document.getElementById('homeScreen').classList.remove('hidden');
            document.getElementById('drawingScreen').classList.add('hidden');
            currentUnit = null;
            currentArea = null;
            placeMode = false;
            renderUnitList();
        }
        
        function showDrawing(unitId) {
            currentUnit = unitId;
            const unit = units[unitId];
            
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('drawingScreen').classList.remove('hidden');
            
            document.getElementById('drawingTitle').textContent = `Unit ${unit.unit_number}`;
            document.getElementById('drawingSubtitle').textContent = 
                `${unit.num_penetrations} penetrations • ${unit.level}`;
            
            // Populate area dropdown
            const areaSelect = document.getElementById('areaSelect');
            areaSelect.innerHTML = '<option value="">Select Area...</option>';
            unit.areas.forEach(a => {
                const key = `${unit.level}-${a}`;
                areaSelect.innerHTML += `<option value="${key}">Area ${a}</option>`;
            });
            
            currentArea = null;
            placeMode = false;
            updateModeUI();
            renderPenList();
            
            // Load first area if available
            if (unit.areas.length > 0) {
                areaSelect.value = `${unit.level}-${unit.areas[0]}`;
                loadArea();
            } else {
                document.getElementById('noDrawing').style.display = 'flex';
                document.getElementById('drawingWrapper').style.display = 'none';
            }
        }
        
        // ═══════════════════════════════════════════════════════════════════
        // UNIT MANAGEMENT
        // ═══════════════════════════════════════════════════════════════════
        
        function createUnit() {
            const unitNum = document.getElementById('unitInput').value.trim();
            const penCount = parseInt(document.getElementById('penCountInput').value) || 0;
            const level = document.getElementById('levelSelect').value;
            const areasStr = document.getElementById('areasInput').value.trim();
            
            if (!unitNum) { alert('Enter unit number'); return; }
            if (penCount < 1) { alert('Enter number of penetrations'); return; }
            if (!level) { alert('Select level'); return; }
            
            const areas = areasStr ? areasStr.split(',').map(a => a.trim()).filter(a => a) : [];
            
            const id = unitNum.replace(/\s+/g, '_');
            
            // Initialize penetrations (unplaced)
            const penetrations = {};
            for (let i = 1; i <= penCount; i++) {
                penetrations[i] = { area: null, x: null, y: null, comment: '', captured: {} };
            }
            
            units[id] = {
                unit_number: unitNum,
                num_penetrations: penCount,
                level: level,
                areas: areas,
                penetrations: penetrations,
                drawings: {}
            };
            
            saveState();
            showToast(`Unit ${unitNum} created with ${penCount} penetrations!`);
            
            // Reset form
            document.getElementById('unitInput').value = '';
            document.getElementById('penCountInput').value = '';
            document.getElementById('levelSelect').value = '';
            document.getElementById('areasInput').value = '';
            
            renderUnitList();
        }
        
        function deleteUnit(id) {
            if (!confirm(`Delete Unit ${units[id].unit_number}? This cannot be undone.`)) return;
            delete units[id];
            saveState();
            renderUnitList();
        }
        
        function editUnit() {
            if (!currentUnit) return;
            const unit = units[currentUnit];
            
            const newNum = prompt('Unit Number:', unit.unit_number);
            if (newNum === null) return;
            
            const newLevel = prompt('Level (L1-L6):', unit.level);
            if (newLevel === null) return;
            
            const newAreas = prompt('Drawing Areas (comma-separated):', unit.areas.join(','));
            if (newAreas === null) return;
            
            unit.unit_number = newNum.trim() || unit.unit_number;
            unit.level = newLevel.trim() || unit.level;
            unit.areas = newAreas ? newAreas.split(',').map(a => a.trim()).filter(a => a) : unit.areas;
            
            saveState();
            
            // Update UI
            document.getElementById('drawingTitle').textContent = `Unit ${unit.unit_number}`;
            document.getElementById('drawingSubtitle').textContent = 
                `${unit.num_penetrations} penetrations • ${unit.level}`;
            
            // Update area dropdown
            const areaSelect = document.getElementById('areaSelect');
            areaSelect.innerHTML = '<option value="">Select Area...</option>';
            unit.areas.forEach(a => {
                const key = `${unit.level}-${a}`;
                areaSelect.innerHTML += `<option value="${key}">Area ${a}</option>`;
            });
            
            showToast('Unit updated!');
        }
        
        function addPenetrations() {
            if (!currentUnit) return;
            const unit = units[currentUnit];
            
            const addCount = prompt('How many penetrations to add?', '5');
            if (addCount === null) return;
            
            const count = parseInt(addCount);
            if (isNaN(count) || count < 1) {
                showToast('Invalid number');
                return;
            }
            
            const oldCount = unit.num_penetrations;
            const newCount = oldCount + count;
            
            // Add new penetrations
            for (let i = oldCount + 1; i <= newCount; i++) {
                unit.penetrations[i] = { area: null, x: null, y: null, comment: '', captured: {}, status: 'active' };
            }
            
            unit.num_penetrations = newCount;
            saveState();
            
            // Update UI
            document.getElementById('drawingSubtitle').textContent = 
                `${unit.num_penetrations} penetrations • ${unit.level}`;
            
            renderPenList();
            updateNextPenNum();
            
            showToast(`Added ${count} penetrations (now ${newCount} total)`);
        }
        
        function renderUnitList() {
            const container = document.getElementById('unitList');
            const empty = document.getElementById('emptyState');
            const ids = Object.keys(units);
            
            if (ids.length === 0) {
                container.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            
            empty.classList.add('hidden');
            container.innerHTML = ids.map(id => {
                const u = units[id];
                const { placed, photos, total, skipped } = getUnitProgress(u);
                const pct = total > 0 ? Math.round((photos / total) * 100) : 0;
                
                return `
                    <div class="unit-item">
                        <div onclick="showDrawing('${id}')" style="flex: 1; cursor: pointer;">
                            <h4>Unit ${u.unit_number}</h4>
                            <p>${u.level} • ${u.num_penetrations} pen.${skipped > 0 ? ` (${skipped} skip)` : ''} • ${placed} placed</p>
                        </div>
                        <div class="unit-progress" onclick="showDrawing('${id}')" style="cursor: pointer;">
                            <div class="pct ${pct === 100 ? 'complete' : ''}">${pct}%</div>
                            <div style="font-size: 11px; color: var(--gray-500);">${photos}/${total}</div>
                        </div>
                        <div style="display: flex; gap: 4px; margin-left: 8px;">
                            <button class="btn btn-small btn-success" onclick="event.stopPropagation(); generatePDF('${id}')" title="Generate PDF Report">📋</button>
                            <button class="btn btn-small btn-teal" onclick="event.stopPropagation(); exportForPipeline('${id}')" title="Export for Python pipeline">📄</button>
                            <button class="btn btn-small btn-secondary" onclick="event.stopPropagation(); deleteUnit('${id}')" title="Delete">🗑</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function getUnitProgress(u) {
            let placed = 0;
            let photos = 0;
            let skipped = 0;
            let activePens = 0;
            
            for (let p = 1; p <= u.num_penetrations; p++) {
                const pen = u.penetrations[p];
                if (pen && pen.status === 'skip') {
                    skipped++;
                    continue;
                }
                activePens++;
                if (pen && pen.x !== null) placed++;
                if (pen && pen.captured) {
                    photos += Object.keys(pen.captured).length;
                }
            }
            
            const total = activePens * 12; // 3 stages × 2 cuts × 2 photos (excluding skipped)
            
            return { placed, photos, total, skipped, activePens };
        }
        
        // ═══════════════════════════════════════════════════════════════════
        // DRAWING & AREA MANAGEMENT
        // ═══════════════════════════════════════════════════════════════════
        
        function loadArea() {
            const areaKey = document.getElementById('areaSelect').value;
            if (!areaKey) return;
            
            currentArea = areaKey;
            const unit = units[currentUnit];
            
            // Check if we have a saved drawing for this area
            if (unit.drawings && unit.drawings[areaKey]) {
                showDrawingImage(unit.drawings[areaKey]);
            } else {
                // Try to load from file system (filename pattern)
                const img = document.getElementById('drawingImage');
                const filename = `floor_${areaKey.replace('-', '_area')}.png`;
                img.src = filename;
                
                img.onload = () => {
                    document.getElementById('noDrawing').style.display = 'none';
                    document.getElementById('drawingWrapper').style.display = 'inline-block';
                    document.getElementById('areaStatus').textContent = `Loaded: ${filename}`;
                    resetZoom();
                    renderMarkers();
                };
                
                img.onerror = () => {
                    document.getElementById('areaStatus').textContent = `No image for ${areaKey}`;
                    document.getElementById('noDrawing').style.display = 'flex';
                    document.getElementById('drawingWrapper').style.display = 'none';
                };
            }
            
            updateNextPenNum();
            renderPenList();
        }
        
        document.getElementById('drawingInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file || !currentUnit) return;
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                const dataUrl = ev.target.result;
                
                // Save to unit
                if (!currentArea) {
                    // If no area selected, use first available
                    const unit = units[currentUnit];
                    if (unit.areas.length > 0) {
                        currentArea = `${unit.level}-${unit.areas[0]}`;
                        document.getElementById('areaSelect').value = currentArea;
                    } else {
                        currentArea = 'custom-1';
                    }
                }
                
                units[currentUnit].drawings[currentArea] = dataUrl;
                saveState();
                
                showDrawingImage(dataUrl);
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        });
        
        function showDrawingImage(src) {
            const img = document.getElementById('drawingImage');
            img.src = src;
            img.onload = () => {
                document.getElementById('noDrawing').style.display = 'none';
                document.getElementById('drawingWrapper').style.display = 'inline-block';
                document.getElementById('areaStatus').textContent = `Drawing loaded`;
                resetZoom();
                renderMarkers();
            };
        }
        
        // ═══════════════════════════════════════════════════════════════════
        // PENETRATION PLACEMENT
        // ═══════════════════════════════════════════════════════════════════
        
        function togglePlaceMode() {
            placeMode = !placeMode;
            updateModeUI();
        }
        
        function updateModeUI() {
            const banner = document.getElementById('modeBanner');
            const placeBtn = document.querySelector('[onclick="togglePlaceMode()"]');
            
            if (placeMode) {
                banner.classList.remove('hidden');
                banner.classList.add('placing');
                placeBtn.classList.remove('btn-teal');
                placeBtn.classList.add('btn-primary');
                placeBtn.textContent = '✓ Done';
                updateNextPenNum();
            } else {
                banner.classList.add('hidden');
                placeBtn.classList.remove('btn-primary');
                placeBtn.classList.add('btn-teal');
                placeBtn.textContent = '📍 Place';
            }
        }
        
        function updateNextPenNum() {
            const unit = units[currentUnit];
            if (!unit) return;
            
            // Find first unplaced penetration
            for (let p = 1; p <= unit.num_penetrations; p++) {
                if (!unit.penetrations[p].area) {
                    document.getElementById('nextPenNum').textContent = p;
                    return;
                }
            }
            document.getElementById('nextPenNum').textContent = 'All placed!';
        }
        
        function handleDrawingClick(event) {
            if (!currentArea || !currentUnit) return;
            
            const img = document.getElementById('drawingImage');
            const rect = img.getBoundingClientRect();
            
            const x = (event.clientX - rect.left) / rect.width;
            const y = (event.clientY - rect.top) / rect.height;
            
            // Handle relocate mode
            if (relocateMode) {
                const unit = units[currentUnit];
                unit.penetrations[relocateMode].area = currentArea;
                unit.penetrations[relocateMode].x = x;
                unit.penetrations[relocateMode].y = y;
                saveState();
                renderMarkers();
                renderPenList();
                showToast(`Relocated Pen #${relocateMode}`);
                relocateMode = false;
                document.getElementById('modeBanner').classList.add('hidden');
                return;
            }
            
            if (placeMode) {
                // Place next unplaced penetration
                const unit = units[currentUnit];
                for (let p = 1; p <= unit.num_penetrations; p++) {
                    if (!unit.penetrations[p].area) {
                        unit.penetrations[p].area = currentArea;
                        unit.penetrations[p].x = x;
                        unit.penetrations[p].y = y;
                        saveState();
                        renderMarkers();
                        renderPenList();
                        updateNextPenNum();
                        showToast(`Placed Pen #${p}`);
                        return;
                    }
                }
                showToast('All penetrations placed!');
                placeMode = false;
                updateModeUI();
            }
        }
        
        function renderMarkers() {
            const wrapper = document.getElementById('drawingWrapper');
            wrapper.querySelectorAll('.pen-marker').forEach(m => m.remove());
            
            if (!currentUnit || !currentArea) return;
            
            const unit = units[currentUnit];
            
            for (let p = 1; p <= unit.num_penetrations; p++) {
                const pen = unit.penetrations[p];
                if (pen.area !== currentArea || pen.x === null) continue;
                
                const status = getPenStatus(pen);
                
                const el = document.createElement('div');
                el.className = `pen-marker ${status}`;
                el.textContent = p;
                el.style.left = `${pen.x * 100}%`;
                el.style.top = `${pen.y * 100}%`;
                el.onclick = (e) => {
                    e.stopPropagation();
                    openCapture(p);
                };
                wrapper.appendChild(el);
            }
        }
        
        function getPenStatus(pen) {
            if (pen.status === 'skip') return 'skipped';
            if (!pen.area) return 'unmarked';
            const capturedCount = Object.keys(pen.captured || {}).length;
            if (capturedCount === 0) return 'marked';
            if (capturedCount >= 12) return 'complete';
            return 'partial';
        }
        
        function renderPenList() {
            const container = document.getElementById('penList');
            if (!currentUnit) { container.innerHTML = ''; return; }
            
            const unit = units[currentUnit];
            let html = '';
            
            for (let p = 1; p <= unit.num_penetrations; p++) {
                const pen = unit.penetrations[p];
                const status = getPenStatus(pen);
                const capturedCount = Object.keys(pen.captured || {}).length;
                const areaLabel = pen.area ? pen.area.split('-')[1] : '—';
                const skipLabel = status === 'skipped' ? ' ⏭' : '';
                const statusText = status === 'skipped' ? 'SKIP' : `${capturedCount}/12`;
                
                html += `
                    <div class="pen-list-item" onclick="openCapture(${p})" style="${status === 'skipped' ? 'opacity: 0.6;' : ''}">
                        <span>Pen ${p}${skipLabel} (Area ${areaLabel})</span>
                        <span class="status ${status}">${statusText}</span>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        // ═══════════════════════════════════════════════════════════════════
        // PHOTO CAPTURE
        // ═══════════════════════════════════════════════════════════════════
        
        function openCapture(penNum) {
            if (!currentUnit) return;
            
            currentPen = penNum;
            currentStage = 'before';
            
            document.getElementById('captureModal').classList.remove('hidden');
            document.getElementById('capturePenTitle').textContent = `Penetration ${penNum}`;
            
            const unit = units[currentUnit];
            const pen = unit.penetrations[penNum];
            document.getElementById('penComment').value = pen.comment || '';
            
            updateSkipButton();
            renderCaptureUI();
        }
        
        function closeCapture() {
            document.getElementById('captureModal').classList.add('hidden');
            currentPen = null;
            renderMarkers();
            renderPenList();
        }
        
        function setStage(stage) {
            currentStage = stage;
            renderCaptureUI();
        }
        
        function renderCaptureUI() {
            const unit = units[currentUnit];
            const pen = unit.penetrations[currentPen];
            
            // Update stage tabs
            ['before', 'after', 'patch'].forEach(stage => {
                const tab = document.querySelector(`.stage-tab[data-stage="${stage}"]`);
                const count = countStagePhotos(pen, stage);
                tab.querySelector('div:last-child').textContent = `${count}/4`;
                tab.classList.toggle('active', stage === currentStage);
                tab.classList.toggle('complete', count >= 4 && stage !== currentStage);
            });
            
            // Render cut cards
            const container = document.getElementById('cutsContainer');
            container.innerHTML = `
                <div class="cut-card">
                    <h4>Cut A</h4>
                    <div class="cut-label">Room Side</div>
                    <div class="photo-buttons">
                        ${renderPhotoBtn(pen, 'A', 1)}
                        ${renderPhotoBtn(pen, 'A', 2)}
                    </div>
                </div>
                <div class="cut-card">
                    <h4>Cut B</h4>
                    <div class="cut-label">Corridor Side</div>
                    <div class="photo-buttons">
                        ${renderPhotoBtn(pen, 'B', 1)}
                        ${renderPhotoBtn(pen, 'B', 2)}
                    </div>
                </div>
            `;
        }
        
        function renderPhotoBtn(pen, cut, slot) {
            const key = `${currentStage}_${cut}_${slot}`;
            const captured = pen.captured && pen.captured[key];
            
            return `
                <button class="photo-btn ${captured ? 'captured' : ''}" onclick="takePhoto('${cut}', ${slot})">
                    <span class="icon">${captured ? '✓' : '📷'}</span>
                    <span>Photo ${slot}</span>
                </button>
            `;
        }
        
        function countStagePhotos(pen, stage) {
            if (!pen.captured) return 0;
            return Object.keys(pen.captured).filter(k => k.startsWith(stage + '_')).length;
        }
        
        function takePhoto(cut, slot) {
            pendingPhoto = { pen: currentPen, cut, slot, stage: currentStage };
            document.getElementById('photoInput').click();
        }
        
        document.getElementById('photoInput').addEventListener('change', async function(e) {
            if (!e.target.files.length || !pendingPhoto) return;
            
            const file = e.target.files[0];
            const { pen, cut, slot, stage } = pendingPhoto;
            const unit = units[currentUnit];
            
            // Generate filename
            const filename = `${unit.unit_number}_pen${pen}_cut${cut}_${stage}_${slot}.jpg`;
            
            // Compress
            const blob = await compressImage(file);
            
            // Save
            saveFile(blob, filename);
            
            // Mark captured
            const key = `${stage}_${cut}_${slot}`;
            unit.penetrations[pen].captured[key] = true;
            saveState();
            
            // Update UI
            renderCaptureUI();
            showToast(`Saved: ${filename}`);
            
            e.target.value = '';
            pendingPhoto = null;
        });
        
        async function compressImage(file) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();
                
                img.onload = () => {
                    const maxDim = 1500;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxDim || height > maxDim) {
                        if (width > height) {
                            height = (height / width) * maxDim;
                            width = maxDim;
                        } else {
                            width = (width / height) * maxDim;
                            height = maxDim;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob(resolve, 'image/jpeg', 0.85);
                };
                
                img.src = URL.createObjectURL(file);
            });
        }
        
        function saveFile(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }
        
        function saveComment() {
            const comment = document.getElementById('penComment').value;
            units[currentUnit].penetrations[currentPen].comment = comment;
            saveState();
        }
        
        function toggleSkip() {
            const pen = units[currentUnit].penetrations[currentPen];
            pen.status = pen.status === 'skip' ? 'active' : 'skip';
            saveState();
            updateSkipButton();
            renderMarkers();
            renderPenList();
            showToast(pen.status === 'skip' ? `Pen ${currentPen} marked as exploratory/skip` : `Pen ${currentPen} marked as active`);
        }
        
        function updateSkipButton() {
            const pen = units[currentUnit].penetrations[currentPen];
            const btn = document.getElementById('skipBtn');
            if (pen.status === 'skip') {
                btn.textContent = '✓ Mark as Active';
                btn.style.background = 'var(--success)';
            } else {
                btn.textContent = '⏭ Mark as Exploratory/Skip';
                btn.style.background = 'var(--skip)';
            }
        }
        
        function relocatePen() {
            closeCapture();
            relocateMode = currentPen;
            document.getElementById('modeBanner').classList.remove('hidden');
            document.getElementById('modeBanner').classList.add('placing');
            document.getElementById('modeBanner').innerHTML = `Click on drawing to relocate Pen #${currentPen}`;
            showToast(`Click on drawing to relocate Pen #${currentPen}`);
        }
        
        function deletePen() {
            if (!confirm(`Delete Penetration ${currentPen}? This will remove all captured data for this penetration.`)) return;
            
            const unit = units[currentUnit];
            
            // Reset this penetration
            unit.penetrations[currentPen] = { area: null, x: null, y: null, comment: '', captured: {}, status: 'active' };
            
            saveState();
            closeCapture();
            renderMarkers();
            renderPenList();
            showToast(`Penetration ${currentPen} deleted`);
        }
        
        // ═══════════════════════════════════════════════════════════════════
        // ZOOM
        // ═══════════════════════════════════════════════════════════════════
        
        function setZoom(z) {
            zoom = Math.max(0.25, Math.min(3, z));
            document.getElementById('drawingWrapper').style.transform = `scale(${zoom})`;
            document.getElementById('zoomLevel').textContent = Math.round(zoom * 100);
        }
        
        function zoomIn() { setZoom(zoom + 0.25); }
        function zoomOut() { setZoom(zoom - 0.25); }
        function resetZoom() { setZoom(1); }
        
        // ═══════════════════════════════════════════════════════════════════
        // IMPORT/EXPORT
        // ═══════════════════════════════════════════════════════════════════
        
        function exportAll() {
            const data = {
                version: 1,
                exported_at: new Date().toISOString(),
                units: units
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `nccs_residences_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('Exported master file!');
        }
        
        // Export files compatible with Python report pipeline
        function exportForPipeline(unitId) {
            const unit = units[unitId];
            if (!unit) return;
            
            const unitNum = unit.unit_number;
            
            // 1. room_config.json
            const config = {
                room_number: unitNum,
                num_penetrations: unit.num_penetrations,
                floor: unit.level,
                wing: 'Residence',
                created: new Date().toISOString()
            };
            downloadJSON(config, `${unitNum}_room_config.json`);
            
            // 2. notes.json (comments per penetration)
            const notes = {
                room_number: unitNum,
                floor: unit.level,
                wing: 'Residence',
                num_penetrations: unit.num_penetrations,
                exported_at: new Date().toISOString(),
                penetration_comments: {}
            };
            for (let p = 1; p <= unit.num_penetrations; p++) {
                const pen = unit.penetrations[p];
                if (pen && pen.comment) {
                    notes.penetration_comments[p] = pen.comment;
                }
            }
            downloadJSON(notes, `${unitNum}_notes.json`);
            
            // 3. penetration_map.json (floor plan coordinates)
            const penMap = {
                version: 1,
                exported_at: new Date().toISOString(),
                room: unitNum,
                level: unit.level,
                penetrations: {}
            };
            for (let p = 1; p <= unit.num_penetrations; p++) {
                const pen = unit.penetrations[p];
                if (pen && pen.area && pen.x !== null) {
                    if (!penMap.penetrations[pen.area]) {
                        penMap.penetrations[pen.area] = [];
                    }
                    penMap.penetrations[pen.area].push({
                        id: `${unitNum}-P${p}`,
                        room: unitNum,
                        pen: p,
                        x: pen.x,
                        y: pen.y
                    });
                }
            }
            downloadJSON(penMap, `${unitNum}_penetration_map.json`);
            
            showToast(`Exported 3 files for Unit ${unitNum}!`);
        }
        
        function downloadJSON(data, filename) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // ═══════════════════════════════════════════════════════════════════
        // PDF GENERATION (In-Browser)
        // ═══════════════════════════════════════════════════════════════════
        
        async function generatePDF(unitId) {
            const unit = units[unitId];
            if (!unit) return;
            
            showToast('Generating PDF...');
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const unitNum = unit.unit_number;
            const pageWidth = doc.internal.pageSize.getWidth();
            const margin = 15;
            let y = 20;
            
            // Colors (RGB)
            const NCCS_DARK = [26, 26, 46];
            const NCCS_ACCENT = [233, 69, 96];
            const NCCS_TEAL = [0, 139, 139];
            const GRAY = [128, 128, 128];
            const SUCCESS = [39, 174, 96];
            const SKIP_COLOR = [155, 89, 182];
            
            // Header
            doc.setFillColor(...NCCS_DARK);
            doc.rect(0, 0, pageWidth, 35, 'F');
            doc.setFillColor(...NCCS_ACCENT);
            doc.rect(0, 35, pageWidth, 3, 'F');
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            doc.text('NCCS Fire Caulk Documentation', margin, 15);
            
            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.text(`Unit ${unitNum} — ${unit.level} — Montage Residences`, margin, 25);
            doc.text(`Generated: ${new Date().toLocaleDateString()}`, margin, 32);
            
            y = 50;
            
            // Progress Summary
            const progress = getUnitProgress(unit);
            const pct = progress.total > 0 ? Math.round((progress.photos / progress.total) * 100) : 0;
            
            doc.setTextColor(...NCCS_TEAL);
            doc.setFontSize(12);
            doc.setFont('helvetica', 'bold');
            doc.text('PROGRESS SUMMARY', margin, y);
            y += 8;
            
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.text(`Total Penetrations: ${unit.num_penetrations}`, margin, y);
            y += 6;
            doc.text(`Active: ${progress.activePens}  |  Skipped: ${progress.skipped}  |  Placed on Drawing: ${progress.placed}`, margin, y);
            y += 6;
            doc.text(`Photo Progress: ${progress.photos} / ${progress.total} (${pct}%)`, margin, y);
            y += 12;
            
            // Penetration Details
            doc.setTextColor(...NCCS_TEAL);
            doc.setFontSize(12);
            doc.setFont('helvetica', 'bold');
            doc.text('PENETRATION DETAILS', margin, y);
            y += 10;
            
            for (let p = 1; p <= unit.num_penetrations; p++) {
                const pen = unit.penetrations[p];
                const status = getPenStatus(pen);
                const capturedCount = Object.keys(pen.captured || {}).length;
                const areaLabel = pen.area ? `Area ${pen.area.split('-')[1]}` : 'Not placed';
                
                // Check if we need a new page
                if (y > 270) {
                    doc.addPage();
                    y = 20;
                }
                
                // Status indicator
                if (status === 'skipped') {
                    doc.setFillColor(...SKIP_COLOR);
                } else if (status === 'complete') {
                    doc.setFillColor(...SUCCESS);
                } else if (status === 'partial') {
                    doc.setFillColor(243, 156, 18); // Warning orange
                } else {
                    doc.setFillColor(...GRAY);
                }
                doc.circle(margin + 3, y - 2, 2, 'F');
                
                // Penetration info
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(10);
                doc.setFont('helvetica', 'bold');
                const statusText = status === 'skipped' ? 'SKIP' : 
                                   status === 'complete' ? 'COMPLETE' : 
                                   `${capturedCount}/12`;
                doc.text(`Pen ${p}`, margin + 10, y);
                
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(...GRAY);
                doc.text(`${areaLabel}  •  ${statusText}`, margin + 30, y);
                
                y += 6;
                
                // Comment if exists
                if (pen.comment) {
                    doc.setTextColor(60, 60, 60);
                    doc.setFontSize(9);
                    
                    // Word wrap for long comments
                    const lines = doc.splitTextToSize(pen.comment, pageWidth - margin * 2 - 15);
                    for (const line of lines) {
                        if (y > 275) {
                            doc.addPage();
                            y = 20;
                        }
                        doc.text(line, margin + 10, y);
                        y += 5;
                    }
                }
                
                y += 4;
            }
            
            // Areas Summary
            if (unit.areas && unit.areas.length > 0) {
                if (y > 250) {
                    doc.addPage();
                    y = 20;
                }
                
                y += 5;
                doc.setTextColor(...NCCS_TEAL);
                doc.setFontSize(12);
                doc.setFont('helvetica', 'bold');
                doc.text('DRAWING AREAS', margin, y);
                y += 8;
                
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                doc.text(`Level: ${unit.level}`, margin, y);
                y += 6;
                doc.text(`Areas: ${unit.areas.join(', ')}`, margin, y);
                y += 6;
                
                // Count penetrations per area
                const areaCount = {};
                for (let p = 1; p <= unit.num_penetrations; p++) {
                    const pen = unit.penetrations[p];
                    if (pen.area) {
                        areaCount[pen.area] = (areaCount[pen.area] || 0) + 1;
                    }
                }
                for (const [area, count] of Object.entries(areaCount)) {
                    doc.text(`  ${area}: ${count} penetrations`, margin, y);
                    y += 5;
                }
            }
            
            // Footer on last page
            const pageCount = doc.internal.getNumberOfPages();
            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                doc.setFillColor(244, 244, 244);
                doc.rect(0, 282, pageWidth, 15, 'F');
                doc.setDrawColor(200, 200, 200);
                doc.line(0, 282, pageWidth, 282);
                
                doc.setTextColor(...GRAY);
                doc.setFontSize(8);
                doc.text(`NCCS — Unit ${unitNum} Summary Report`, margin, 289);
                doc.text(`Page ${i} of ${pageCount}`, pageWidth - margin - 20, 289);
            }
            
            // Save
            const filename = `Unit_${unitNum}_Summary_${new Date().toISOString().slice(0,10)}.pdf`;
            doc.save(filename);
            
            showToast(`PDF saved: ${filename}`);
        }
        
        document.getElementById('importInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    
                    if (data.units) {
                        if (Object.keys(units).length > 0) {
                            if (confirm('Merge with existing? (Cancel to replace)')) {
                                Object.assign(units, data.units);
                            } else {
                                units = data.units;
                            }
                        } else {
                            units = data.units;
                        }
                        
                        saveState();
                        renderUnitList();
                        showToast('Imported!');
                    }
                } catch (err) {
                    alert('Import failed: ' + err.message);
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        });
        
        // ═══════════════════════════════════════════════════════════════════
        // TOAST
        // ═══════════════════════════════════════════════════════════════════
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 2500);
        }
        
        // ═══════════════════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════════════════
        
        loadState();
        renderUnitList();
    </script>
</body>
</html>
